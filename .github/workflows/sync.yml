# .github/workflows/sync_to_hf.yml
name: Daily ETF Data Sync to HF

on:
  schedule:
    - cron: '30 22 * * 1-5'  # 22:30 UTC weekdays
  workflow_dispatch:

jobs:
  build-and-sync:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install Dependencies
        run: |
          pip install yfinance pandas-datareader huggingface-hub pandas numpy
          
      - name: Incremental Update HF Dataset
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python scripts/ingestor_incremental.py
